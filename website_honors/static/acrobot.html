<!DOCTYPE html>
<html>
<head>
  <title>Acrobot Human-Control</title>
  <style>
    body { text-align: center; font-family: sans-serif; margin-top: 20px; }
    canvas { border: 2px solid black; }
    button { padding: 8px 16px; margin: 8px; font-size: 16px; cursor: pointer; }
    .instructions { font-size: 12px; max-width: 420px; margin: 10px auto; text-align: left; }
  </style>
</head>
<body>

<h2>Acrobot Human-Control (Gym Physics)</h2>
<canvas id="acrobotCanvas" width="350" height="350"></canvas>
<h3 id="timer">Time: 0.0 s</h3>

<div class="instructions" id="instructionsBox">
  <p><strong>Goal:</strong> Reach the red line. Pump the swing using arrow keys.</p>
  <p><strong>Controls:</strong> Left/Right Arrow keys apply torque.</p>
</div>

<button id="resetBtn">Restart</button>
<button onclick="location.href='/static/index.html'">⬅ Back to Menu</button>

<script>
const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");
const resetBtn = document.getElementById("resetBtn");

// --- Human input ---
const keys = { ArrowLeft: false, ArrowRight: false };
document.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
document.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

// --- Timer ---
let startTime = performance.now();

// --- Canvas drawing ---
function drawAcrobot(theta1, theta2) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const originX = w/2;
  const originY = 50;
  const l1 = 100;
  const l2 = 100;

  const x1 = originX + l1 * Math.sin(theta1);
  const y1 = originY + l1 * Math.cos(theta1);
  const x2 = x1 + l2 * Math.sin(theta1 + theta2);
  const y2 = y1 + l2 * Math.cos(theta1 + theta2);

  // Links
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  // Joints
  ctx.fillStyle = "black";
  [[originX, originY],[x1, y1],[x2, y2]].forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();
  });

  // Target line
  ctx.beginPath();
  ctx.setLineDash([8,8]);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;
  const targetY = 97;
  ctx.moveTo(0, targetY);
  ctx.lineTo(w, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// --- API ---
const API_BASE = "/acrobot";
let state = null;
let resetting = false;

// Reset environment
async function reset() {
  resetting = true;
  const res = await fetch(`${API_BASE}/reset`, { method: "POST" });
  const data = await res.json();
  state = data.state;
  startTime = performance.now();
  resetting = false;
}

// Step environment
async function step() {
  if (resetting || !state) return;

  // Map human input to Gym actions
  let action = 1; // default no torque
  if (keys.ArrowLeft) action = 0;
  if (keys.ArrowRight) action = 2;

  const res = await fetch(`${API_BASE}/step/${action}`, { method: "POST" });
  const data = await res.json();

  state = data.state; // [x1, x2, theta1, theta2]
  drawAcrobot(state[0], state[1]);

  // Optional: detect success (tip above line)
  const tipY = 50 + 100*Math.cos(state[2]) + 100*Math.cos(state[2]+state[3]);
  if (tipY <= 97) console.log("Tip reached target!");
}

// --- Game loop ---
async function gameLoop() {
  await step();
  timerEl.textContent = `Time: ${((performance.now()-startTime)/1000).toFixed(1)} s`;
  requestAnimationFrame(gameLoop);
}

// --- Restart button ---
resetBtn.addEventListener("click", reset);

// --- Start ---
reset().then(() => requestAnimationFrame(gameLoop));
</script>

</body>
</html>
