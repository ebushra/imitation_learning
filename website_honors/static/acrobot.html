<!DOCTYPE html>
<html>
<head>
  <title>Acrobot</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    canvas {
      border: 2px solid black;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>Acrobot Demo</h2>
<canvas id="acrobotCanvas" width="350" height="350"></canvas>

<h3 id="timer">Time: 0.0 s</h3>

<div class="instructions" id="instructionsBox">
  <p><strong>Goal</strong><br>Reach the red line. Each stage moves the target higher.</p>
  <p><strong>Controls</strong><br>Use the <em>Left</em> and <em>Right Arrow</em> keys to apply torque.</p>
  <p><strong>Hint</strong><br>Pump the swing — go with the motion, not against it.</p>
</div>

<button id="resetBtn">Restart</button>
<button onclick="location.href='/static/index.html'">⬅ Back to Menu</button>

<script>
const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");

let startTime = performance.now();

// Draw Acrobot function
function drawAcrobot(theta1, theta2) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const originX = w/2;
  const originY = 50;
  const l1 = 100;
  const l2 = 100;

  const x1 = originX + l1 * Math.sin(theta1);
  const y1 = originY + l1 * Math.cos(theta1);

  const x2 = x1 + l2 * Math.sin(theta1 + theta2);
  const y2 = y1 + l2 * Math.cos(theta1 + theta2);

  // Links
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  // Joints
  ctx.fillStyle = "black";
  [[originX, originY],[x1, y1],[x2, y2]].forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();
  });

  // Target line
  ctx.beginPath();
  ctx.setLineDash([8,8]);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;
  const targetY = 97;
  ctx.moveTo(0, targetY);
  ctx.lineTo(w, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// Restart button
document.getElementById("resetBtn").addEventListener("click", () => {
  startTime = performance.now();
});

// Game loop: automatic motion
function gameLoop() {
  const t = (performance.now() - startTime)/1000; // seconds

  // Simulate swinging motion with sine waves
  const theta1 = Math.sin(t * 2) * Math.PI/4;  // swings ±45°
  const theta2 = Math.sin(t * 3) * Math.PI/6;  // swings ±30° relative to first link

  drawAcrobot(theta1, theta2);

  // Update timer
  timerEl.textContent = `Time: ${t.toFixed(1)} s`;

  requestAnimationFrame(gameLoop);
}

// Start loop
gameLoop();
</script>

</body>
</html>
