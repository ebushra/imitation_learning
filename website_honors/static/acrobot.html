<script>
// --- Canvas & UI elements ---
const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const resetBtn = document.getElementById("resetBtn");
const lapsDiv = document.getElementById("laps");
const timerEl = document.getElementById("timer");

// --- Controls ---
const keys = { ArrowLeft: false, ArrowRight: false };
document.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
document.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

// --- Timer ---
let startTime = null;
let laps = [];

function startTimer() { startTime = performance.now(); }
function getCurrentTime() { return startTime ? (performance.now() - startTime)/1000 : 0; }
function updateTimerDisplay() { timerEl.textContent = `Time: ${getCurrentTime().toFixed(1)} s`; }
function recordLap(time) {
  laps.push(time);
  lapsDiv.innerHTML = laps.map((t,i) => `Round ${i+1}: ${t.toFixed(1)} s`).join("<br>");
}

// --- Action mapping ---
function getAction() {
  if (keys.ArrowLeft) return 0;   // left torque
  if (keys.ArrowRight) return 2;  // right torque
  return 1; // no-op
}

// --- Draw Acrobot ---
function drawAcrobot(theta1, theta2) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const originX = w/2;
  const originY = 50;
  const l1 = 100;
  const l2 = 100;

  const x1 = originX + l1 * Math.sin(theta1);
  const y1 = originY + l1 * Math.cos(theta1);
  const x2 = x1 + l2 * Math.sin(theta1 + theta2);
  const y2 = y1 + l2 * Math.cos(theta1 + theta2);

  // Links
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  // Joints
  ctx.fillStyle = "black";
  [ [originX, originY], [x1, y1], [x2, y2] ].forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
  });

  // Target line
  ctx.beginPath();
  ctx.setLineDash([8,8]);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;
  const targetY = 97;
  ctx.moveTo(0, targetY);
  ctx.lineTo(w, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// --- API ---
const API_BASE = "/acrobot";
let resetting = false;

async function reset() {
  resetting = true;
  const res = await fetch(`${API_BASE}/reset`, { method: "POST" });
  const data = await res.json();
  startTimer();
  resetting = false;
  return data;
}

async function step() {
  if (resetting) return;

  const action = getAction();
  const res = await fetch(`${API_BASE}/step/${action}`, { method: "POST" });
  const data = await res.json();

  drawAcrobot(data.state[0], data.state[2]);
  updateTimerDisplay();

  // Record lap if success
  if (data.success) {
    const lapTime = getCurrentTime();
    recordLap(lapTime);
    await reset();
  }
}

// --- Game loop ---
async function gameLoop() {
  await step();
  requestAnimationFrame(gameLoop);
}

// --- Back button ---
const backBtn = document.createElement("button");
backBtn.textContent = "⬅ Back to Menu";
backBtn.style.margin = "8px";
backBtn.onclick = () => window.location.href = "/index.html";
document.body.insertBefore(backBtn, document.body.firstChild);

// --- Initialize ---
reset().then(() => requestAnimationFrame(gameLoop));
resetBtn.addEventListener("click", reset);

</script>
