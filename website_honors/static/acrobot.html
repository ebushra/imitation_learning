<!DOCTYPE html>
<html>
<head>
  <title>Acrobot Human-Control</title>
  <style>
    body { text-align: center; font-family: sans-serif; margin-top: 20px; }
    canvas { border: 2px solid black; }
    button { padding: 8px 16px; margin: 8px; font-size: 16px; cursor: pointer; }
    .instructions { font-size: 12px; max-width: 420px; margin: 10px auto; text-align: left; }
  </style>
</head>
<body>

<h2>Acrobot Human-Control</h2>
<canvas id="acrobotCanvas" width="350" height="350"></canvas>
<h3 id="timer">Time: 0.0 s</h3>

<div class="instructions" id="instructionsBox">
  <p><strong>Goal:</strong> Reach the red line. Pump the swing using arrow keys.</p>
  <p><strong>Controls:</strong> Left/Right Arrow keys apply torque.</p>
</div>

<button id="resetBtn">Restart</button>
<button onclick="location.href='/static/index.html'">⬅ Back to Menu</button>

<script>
const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");
const resetBtn = document.getElementById("resetBtn");

// --- Human input ---
const keys = { ArrowLeft: false, ArrowRight: false };
document.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
document.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

// --- Timer ---
let startTime = performance.now();

// --- Acrobot state ---
let theta1 = 0, theta2 = 0;      // angles
let theta1Dot = 0, theta2Dot = 0; // angular velocities
const dt = 0.02;                 // simulation timestep ~50Hz

// --- Drawing function ---
function drawAcrobot(theta1, theta2) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const originX = w/2;
  const originY = 50;
  const l1 = 100;
  const l2 = 100;

  const x1 = originX + l1 * Math.sin(theta1);
  const y1 = originY + l1 * Math.cos(theta1);
  const x2 = x1 + l2 * Math.sin(theta1 + theta2);
  const y2 = y1 + l2 * Math.cos(theta1 + theta2);

  // Links
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  // Joints
  ctx.fillStyle = "black";
  [[originX, originY],[x1, y1],[x2, y2]].forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();
  });

  // Target line
  ctx.beginPath();
  ctx.setLineDash([8,8]);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;
  const targetY = 97;
  ctx.moveTo(0, targetY);
  ctx.lineTo(w, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// --- Physics update (simplified) ---
function physicsStep(action) {
  // Torque mapping
  let torque = 0;
  if (keys.ArrowLeft) torque = -1;
  if (keys.ArrowRight) torque = 1;

  // Simple pendulum physics: just for demo/swinging effect
  // Not a full Acrobot simulation — just enough to move angles realistically
  const g = 9.8;
  const l = 1.0;
  theta1Dot += (-g/l * Math.sin(theta1) + torque*0.5) * dt;
  theta2Dot += (-g/l * Math.sin(theta2) + torque*0.3) * dt;

  theta1 += theta1Dot * dt;
  theta2 += theta2Dot * dt;

  // damping
  theta1Dot *= 0.99;
  theta2Dot *= 0.99;
}

// --- Game loop ---
function gameLoop() {
  // Physics
  physicsStep(getAction());

  // Draw
  drawAcrobot(theta1, theta2);

  // Update timer
  const t = (performance.now() - startTime)/1000;
  timerEl.textContent = `Time: ${t.toFixed(1)} s`;

  requestAnimationFrame(gameLoop);
}

// --- Get action (for API consistency, still human input) ---
function getAction() {
  if (keys.ArrowLeft) return 0;
  if (keys.ArrowRight) return 2;
  return 1;
}

// --- Reset ---
resetBtn.addEventListener("click", ()=>{
  theta1 = theta2 = theta1Dot = theta2Dot = 0;
  startTime = performance.now();
});

// --- Start ---
gameLoop();
</script>
</body>
</html>
