<!DOCTYPE html>
<html>
<head>
  <title>Acrobot</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    canvas {
      border: 2px solid black;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>Acrobot</h2>
<canvas id="acrobotCanvas" width="350" height="350"></canvas>

<h3 id="timer">Time: 0.0 s</h3>
<div id="laps" style="font-size:14px; margin-top:8px;"></div>

<div class="instructions">
  <p> <strong>Goal</strong><br> Swing the pendulum so that its tip rises above the horizontal target line. </p>
  <p> <strong>Controls</strong><br> Use the <em>Left</em> and <em>Right Arrow</em> keys to apply torque. Movement is continuous.</p>
  <p> <strong>Hint</strong><br> Build momentum by swinging back and forth.</p>
</div>

<button id="resetBtn">Reset</button>
<button onclick="location.href='/static/index.html'">⬅ Back to Menu</button>

<script>
if (localStorage.getItem("acrobot_training_complete") !== "1") {
  alert("You must complete Acrobot Training before playing this mode!");
  window.location.replace("/static/acrobot_training.html");
}

// Canvas & UI
const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const resetBtn = document.getElementById("resetBtn");
const lapsDiv = document.getElementById("laps");
const timerEl = document.getElementById("timer");

// Controls
const keys = { ArrowLeft: false, ArrowRight: false };
document.addEventListener("keydown", e => { if (e.key in keys) keys[e.key] = true; });
document.addEventListener("keyup", e => { if (e.key in keys) keys[e.key] = false; });

// Timer
let startTime = null;
let laps = [];

function startTimer() { startTime = performance.now(); }
function getCurrentTime() { return startTime ? (performance.now() - startTime)/1000 : 0; }
function updateTimerDisplay() { timerEl.textContent = `Time: ${getCurrentTime().toFixed(1)} s`; }
function recordLap(time) {
  laps.push(time);
  lapsDiv.innerHTML = laps.map((t,i) => `Round ${i+1}: ${t.toFixed(1)} s`).join("<br>");
}

// Action mapping
function getAction() {
  if (keys.ArrowLeft) return 0;   // left torque
  if (keys.ArrowRight) return 2;  // right torque
  return 1; // no-op
}

// Draw Acrobot
function drawAcrobot(theta1, theta2) {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const originX = w/2;
  const originY = 50;
  const l1 = 100;
  const l2 = 100;

  const x1 = originX + l1 * Math.sin(theta1);
  const y1 = originY + l1 * Math.cos(theta1);

  const x2 = x1 + l2 * Math.sin(theta2 + theta1);
  const y2 = y1 + l2 * Math.cos(theta2 + theta1);

  // Links
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  // Joints
  ctx.fillStyle = "black";
  [ [originX, originY], [x1, y1], [x2, y2] ].forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
  });

  // Target line
  ctx.beginPath();
  ctx.setLineDash([8,8]);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 3;
  const targetY = 97; // adjust if needed
  ctx.moveTo(0, targetY);
  ctx.lineTo(w, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// --- API calls ---
const API_BASE = "/acrobot";
let resetting = false;

async function reset() {
  resetting = true;
  const res = await fetch(`${API_BASE}/reset`, { method: "POST" });
  const data = await res.json();
  startTimer();
  resetting = false;
  return data;
}

async function step() {
  if (resetting) return;

  const action = getAction();
  const res = await fetch(`${API_BASE}/step/${action}`, { method: "POST" });
  const data = await res.json();

  // Draw Acrobot using numeric state
  drawAcrobot(data.state[0], data.state[2]);

  updateTimerDisplay();

  // Record lap if success
  if (data.success) {
    const lapTime = getCurrentTime();
    recordLap(lapTime);
    await reset();
  }
}

// Game loop
async function gameLoop() {
  await step();
  requestAnimationFrame(gameLoop);
}

// Initialize
reset().then(() => requestAnimationFrame(gameLoop));
resetBtn.addEventListener("click", reset);

</script>

</body>
</html>
