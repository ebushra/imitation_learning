<!DOCTYPE html>
<html>
<head>
  <title>Acrobot</title>

  <style>
    body { text-align: center; font-family: sans-serif; margin-top: 20px; }

    canvas {
      border: 2px solid black;
      display: block;
      margin: auto;
    }

    button { padding: 8px 16px; margin: 8px; font-size: 16px; cursor: pointer; }

    .instructions { font-size: 12px; max-width: 420px; margin: 10px auto; text-align: left; }

    /* 🔵 canvas wrapper for overlay */
    #gameWrapper {
      position: relative;
      width: 220px;
      margin: auto;
    }

    /* ⏱ timer overlay */
    #timer {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: bold;
      background: rgba(255,255,255,0.8);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* countdown */
    #countdown {
      font-size: 64px;
      font-weight: bold;
      margin: 10px;
      min-height: 70px;
    }
  </style>
</head>

<body>

<div id="instructionsModal">
  <div id="instructionsModalContent">
    <h3>Acrobot Instructions</h3>
     <p><strong>Goal</strong><br>Reach the red line as fast as possible. Please complete 5 rounds.</p>
    <p><strong>Controls</strong><br>Use the <em>Left</em> and <em>Right Arrow</em> keys.</p>
    <p><strong>Hint</strong><br>Pump the swing.</p>
    <button id="startTrainingBtn">Start</button>
  </div>
</div>

<style>
  #instructionsModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex; justify-content: center; align-items: center;
    z-index: 10;
  }

  #instructionsModalContent {
    background: white; padding: 20px; border-radius: 6px;
    max-width: 400px; text-align: left;
  }
</style>

<h2>Acrobot</h2>

<div id="countdown"></div>

<!-- 🔵 GAME WRAPPER (needed for overlay timer) -->
<div id="gameWrapper">
  <canvas id="acrobotCanvas" width="220" height="220"></canvas>
  <div id="timer">Time: 0.0 s</div>
</div>

<div class="instructions">
  <p><strong>Goal</strong><br>Reach the red line as fast as possible.</p>
</div>

<button id="resetBtn">Restart</button>

<script>

// ---------------- GATE ----------------
if(!localStorage.getItem("acrobot_training_complete")){
  alert("You must complete Acrobot training first!");
  window.location.href = "/static/acrobot_training.html";
}

// ---------------- UI ----------------
const startBtn = document.getElementById("startTrainingBtn");
const modal = document.getElementById("instructionsModal");
const countdownEl = document.getElementById("countdown");

const canvas = document.getElementById("acrobotCanvas");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");

const resetBtn = document.getElementById("resetBtn");

// ---------------- ENV ----------------
const originY = 35;
const L1 = 60;
const L2 = 60;
const targetY = 55;

const keys = { ArrowLeft:false, ArrowRight:false };

document.addEventListener('keydown',e=>{
  if(e.key in keys) keys[e.key]=true;
});

document.addEventListener('keyup',e=>{
  if(e.key in keys) keys[e.key]=false;
});

// ---------------- STATE ----------------
let state = null;
let resetting = false;
let started = false;

let startTime = 0; // ⏱ frozen until countdown ends

// ---------------- COUNTDOWN ----------------
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function runCountdown(){

  countdownEl.textContent = "3";
  await sleep(1000);

  countdownEl.textContent = "2";
  await sleep(1000);

  countdownEl.textContent = "1";
  await sleep(1000);

  countdownEl.textContent = "GO";
  await sleep(600);

  countdownEl.textContent = "";

  // ⏱ START TIMER ONLY NOW
  startTime = performance.now();
  started = true;
}

// ---------------- START ----------------
startBtn.addEventListener("click", async () => {
  modal.style.display = "none";
  await reset();
  await runCountdown();
});

// ---------------- DRAW ----------------
function drawAcrobot(theta1,theta2){

  const w = canvas.width;
  ctx.clearRect(0,0,w,w);

  const originX = w/2;

  const x1 = originX + L1*Math.sin(theta1);
  const y1 = originY + L1*Math.cos(theta1);

  const x2 = x1 + L2*Math.sin(theta1+theta2);
  const y2 = y1 + L2*Math.cos(theta1+theta2);

  ctx.beginPath();
  ctx.moveTo(originX,originY);
  ctx.lineTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.strokeStyle="black";
  ctx.lineWidth=2;
  ctx.stroke();

  // base + end
  ctx.fillStyle="black";
  [[originX,originY],[x2,y2]].forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });

  // 🔵 middle joint
  ctx.fillStyle="blue";
  ctx.beginPath();
  ctx.arc(x1,y1,4,0,Math.PI*2);
  ctx.fill();

  // target
  ctx.beginPath();
  ctx.setLineDash([5,5]);
  ctx.strokeStyle="red";
  ctx.moveTo(0,targetY);
  ctx.lineTo(w,targetY);
  ctx.stroke();
  ctx.setLineDash([]);

  return {y2};
}

// ---------------- RESET ----------------
async function reset(){

  resetting = true;

  const res = await fetch("/acrobot/reset",{method:"POST", credentials:"include"});
  const data = await res.json();

  state = data.state;

  resetting = false;
}

// ---------------- STEP ----------------
async function step(){

  if(!started || resetting || !state) return;

  let action = 1;
  if(keys.ArrowLeft) action = 0;
  if(keys.ArrowRight) action = 2;

  const res = await fetch(`/acrobot/step/${action}`,{method:"POST", credentials:"include"});
  const data = await res.json();

  state = data.state;

  drawAcrobot(state[0],state[1]);
}

// ---------------- LOOP ----------------
async function gameLoop(){

  await step();

  // ⏱ only updates AFTER countdown starts
  if(started){
    timerEl.textContent =
      "Time: " + ((performance.now() - startTime)/1000).toFixed(1) + " s";
  }

  requestAnimationFrame(gameLoop);
}

// ---------------- INIT ----------------
resetBtn.addEventListener("click", reset);

reset().then(()=>requestAnimationFrame(gameLoop));

</script>

</body>
</html>
