<!DOCTYPE html>
<html>
<head>
  <title>CartPole</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    .game-container {
      display: inline-block;
      border: 2px solid black;
      padding: 8px;
      position: relative;
    }
    img, canvas {
      display: block;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #timer {
      margin-top: 8px;
      font-size: 16px;
    }
    #laps {
      font-size: 14px;
      margin-top: 8px;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>CartPole</h2>

<div class="game-container">
  <img id="frame" width="400" />
  <canvas id="overlay" width="400" height="300"
          style="position:absolute; top:0; left:0;"></canvas>
</div>

<h3 id="timer">Time: 0.0 s</h3>
<div id="laps"></div>

<div class="instructions">
  <p><strong>Goal</strong><br>
  Keep the pole balanced upright on the cart for as long as possible.</p>

  <p><strong>Controls</strong><br>
  Use the <em>Left</em> and <em>Right Arrow</em> keys to move the cart.</p>

  <p><strong>Hint</strong><br>
  Apply small, quick corrective moves.</p>
</div>

<button id="resetBtn">Reset</button>
<button onclick="location.href='/index.html'">⬅ Back to Menu</button>

<script>

// ---- LOCK CHECK ----
if (localStorage.getItem("cartpoleUnlocked") !== "true") {
  alert("You must complete CartPole Training first.");
  window.location.href = "/static/cartpole_training.html";
}

// --- Setup ---
const frameImg = document.getElementById("frame");
const overlay = document.getElementById("overlay");
const resetBtn = document.getElementById("resetBtn");

const keysPressed = { ArrowLeft: false, ArrowRight: false };
const API_BASE = "/cartpole";

let startTime = null;
let laps = [];

// --- Key listeners ---
document.addEventListener("keydown", e => {
  if (e.key in keysPressed) keysPressed[e.key] = true;
});

document.addEventListener("keyup", e => {
  if (e.key in keysPressed) keysPressed[e.key] = false;
});

// --- Map key to action ---
function getAction() {
  if (keysPressed.ArrowLeft) return 2;
  if (keysPressed.ArrowRight) return 1;
  return 0;
}

// --- Timer ---
function startTimer() {
  startTime = performance.now();
}

function getCurrentTime() {
  if (!startTime) return 0;
  return (performance.now() - startTime) / 1000;
}

function updateTimerDisplay() {
  document.getElementById("timer").textContent =
    "Time: " + getCurrentTime().toFixed(1) + " s";
}

function recordLap(time) {
  laps.push(time);
  const lapsDiv = document.getElementById("laps");
  lapsDiv.innerHTML =
    laps.map((t,i) =>
      `Round ${i+1}: ${t.toFixed(1)} s`
    ).join("<br>");
}

// --- Reset ---
async function reset() {
  const res = await fetch(`${API_BASE}/reset`, {
    method: "POST"
  });

  const data = await res.json();
  frameImg.src = "data:image/png;base64," + data.frame;

  startTimer();
}

// --- Step ---
async function step() {
  const action = getAction();

  const res = await fetch(`${API_BASE}/step/${action}`, {
    method: "POST"
  });

  const data = await res.json();

  frameImg.src = "data:image/png;base64," + data.frame;

  updateTimerDisplay();

  if (data.done) {
    const lapTime = getCurrentTime();
    recordLap(lapTime);
    await reset();
  }

  drawGauge(overlay, data.theta, data.cart_x);
}

// --- Gauge Drawing ---
function drawGauge(canvas, theta, cartX) {

  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0,0,w,h);

  const worldWidth = 4.8;
  const pixelsPerMeter = w / worldWidth;
  const cartPixelX = (w / 2) + cartX * pixelsPerMeter + 7;

  const pivotX = cartPixelX;
  const pivotY = 200;
  const radius = 80;

  const safeAngle = 12 * Math.PI / 180;

  // Red semicircle
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, radius, Math.PI, 0, false);
  ctx.strokeStyle = "rgba(255, 0, 0, 0.35)";
  ctx.lineWidth = 6;
  ctx.stroke();

  // Green safe zone
  ctx.beginPath();
  ctx.arc(
    pivotX,
    pivotY,
    radius,
    -Math.PI/2 - safeAngle,
    -Math.PI/2 + safeAngle,
    false
  );
  ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
  ctx.lineWidth = 6;
  ctx.stroke();
}

// --- Game Loop (~30 FPS) ---
async function gameLoop() {
  await step();
  setTimeout(gameLoop, 33);
}

// --- Initialize ---
reset().then(gameLoop);
resetBtn.addEventListener("click", reset);

</script>

</body>
</html>
