<!DOCTYPE html>
<html>
<head>
  <title>IL Web Games</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 50px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }
    button {
      padding: 12px 24px;
      margin: 12px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>Imitation Learning Games</h1>

<button onclick="location.href='/static/acrobot.html'">Acrobot</button>
<button onclick="location.href='/static/cartpole.html'">CartPole</button>
<button onclick="location.href='/static/mountaincar.html'">MountainCar</button>

<script>

function openAcrobot(){

  const trained = localStorage.getItem("acrobot_training_complete");

  if(!trained){

    alert("You must complete Acrobot training first!");

    window.location.href="/static/acrobot_training.html";

  }else{

    window.location.href="/static/acrobot.html";

  }

}

</script>
</body>
</html>
