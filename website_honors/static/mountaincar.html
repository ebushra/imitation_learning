<!DOCTYPE html>
<html>
<head>
<title>MountainCar</title>
<style>
body { text-align: center; font-family: sans-serif; margin-top: 20px; }
canvas { border: 2px solid black; }
button { padding: 8px 16px; margin: 8px; font-size: 16px; cursor: pointer; }
.instructions { font-size: 12px; max-width: 420px; margin: 10px auto; text-align: left; }
</style>
</head>
<body>

<h2>MountainCar</h2>
<canvas id="canvas" width="425" height="250"></canvas>
<p id="timer" style="font-size:14px;margin-top:6px;">Time: 0.0 s</p>
<button id="resetBtn">Reset</button>
<button onclick="leaveGame()">⬅ Back to Menu</button>

<script>
if(localStorage.getItem("mountaincarUnlocked") !== "true"){
  alert("You must complete MountainCar Training first.");
  window.location.href = "/static/mountaincar_training.html";
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const API_BASE = "/mountaincar";

const MIN_X = -1.2;
const MAX_X = 0.6;

let stageStartTime = null;
let running = false;
let currentPosition = MIN_X;

function worldToPixel(x){
  return ((x - MIN_X) / (MAX_X - MIN_X)) * canvas.width;
}

function drawMountain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  for(let i=0;i<canvas.width;i++){
    const x = MIN_X + (i / canvas.width) * (MAX_X - MIN_X);
    const y = Math.sin(3*x)*0.45 + 0.55;
    const py = canvas.height*(1-y);
    if(i===0) ctx.moveTo(i,py);
    else ctx.lineTo(i,py);
  }
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawCar(position){
  const xPixel = worldToPixel(position);
  const yWorld = Math.sin(3*position)*0.45 + 0.55;
  const yPixel = canvas.height*(1-yWorld);

  ctx.fillStyle = "red";
  ctx.fillRect(xPixel-10, yPixel-5, 20, 10);

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(xPixel-6, yPixel+5, 3, 0, Math.PI*2);
  ctx.arc(xPixel+6, yPixel+5, 3, 0, Math.PI*2);
  ctx.fill();
}

function drawFlag(){
  const goalPixel = worldToPixel(0.5);
  ctx.beginPath();
  ctx.moveTo(goalPixel, 0);
  ctx.lineTo(goalPixel, canvas.height);
  ctx.strokeStyle = "green";
  ctx.setLineDash([8,6]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function getCurrentTime(){
  if(!stageStartTime) return 0;
  return (performance.now() - stageStartTime) / 1000;
}

function updateTimerDisplay(){
  document.getElementById("timer").textContent = "Time: "+getCurrentTime().toFixed(1)+" s";
}

// --- Backend calls ---
async function reset(){
  const res = await fetch(`${API_BASE}/reset`, {method:"POST"});
  const data = await res.json();
  currentPosition = data.state[0];
  stageStartTime = performance.now();

  drawMountain();
  drawFlag();
  drawCar(currentPosition);
}

async function step(){
  const res = await fetch(`${API_BASE}/step`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({action:1}) // just neutral action for now
  });
  const data = await res.json();
  currentPosition = data.state[0];

  drawMountain();
  drawFlag();
  drawCar(currentPosition);
  updateTimerDisplay();

  if(data.done){
    await reset();
  }
}

// --- Game loop ---
async function gameLoop(){
  if(!running) return;
  await step();
  setTimeout(gameLoop, 50); // ~20 FPS for simplicity
}

async function startSession(){
  await fetch(`${API_BASE}/newsession`, {method:"POST"});
  await reset();
  running = true;
  gameLoop();
}

async function leaveGame(){
  await fetch(`${API_BASE}/newsession`, {method:"POST"});
  window.location.href="/static/index.html";
}

document.getElementById("resetBtn").addEventListener("click", reset);

startSession();
</script>

</body>
</html>
