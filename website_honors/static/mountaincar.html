<!DOCTYPE html>
<html>
<head>
  <title>MountainCar</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    img {
      border: 2px solid black;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>MountainCar</h2>
<canvas id="gameCanvas" width="300" height="200"></canvas>
<br>
<p id="timer" style="font-size:14px; margin-top:6px;">Time: 0.0 s</p>
<p id="status" style="font-size:14px; margin-top:6px;"></p>
<div id="laps" style="margin-top:10px; font-size:14px;"></div>



<div class="instructions">
  <p> <strong>Goal</strong><br> Reach the flag on the right hill.<br> </p>
  <p> <strong>Controls</strong><br> 
  Left / Right Arrow keys. </p> 
  <p> <strong>Hint</strong><br> Move the car to gain enough momentum to reach the flag. </p>
</div>
<p>

<button id="resetBtn">Reset</button>
<button onclick="leaveGame()">⬅ Back to Menu</button>


<script>

if (localStorage.getItem("mountaincarUnlocked") !== "true") {
    alert("You must complete MountainCar Training first.");
    window.location.href = "/static/mountaincar_training.html";
}
const frameImg = document.getElementById("frame");
const resetBtn = document.getElementById("resetBtn");
const API_BASE = "/mountaincar";
let episode = 0;

const keys = { ArrowLeft: false, ArrowRight: false };

let stageStartTime = null;

async function resetStage() {
  await reset(); // call server reset
  stageStartTime = performance.now();
}

function getCurrentTime() {
  if (!stageStartTime) return 0;
  return (performance.now() - stageStartTime) / 1000;
}

function updateTimerDisplay() {
  const timerEl = document.getElementById("timer");
  if (timerEl) {
    timerEl.textContent = "Time: " + getCurrentTime().toFixed(1) + " s";
  }
}


let stepCount = 0;
const TRAIN_EVERY = 300;

const lapsDiv = document.getElementById("laps");

function updateLaps(laps) {
  if (!laps || laps.length === 0) {
    lapsDiv.innerHTML = "";
    return;
  }

  let html = "<strong>Lap Times</strong><br>";
  laps.forEach((t, i) => {
    html += `Round ${i+1}: ${t} s<br>`;
  });

  lapsDiv.innerHTML = html;
}

async function startNewSession() {
  await fetch("/mountaincar/newsession", { method: "POST" });
}

async function leaveGame() {
  await fetch("/mountaincar/newsession", { method: "POST" });
  window.location.href = "/static/index.html";
}

document.addEventListener("keydown", e => {
  if (e.key in keys) keys[e.key] = true;
});

document.addEventListener("keyup", e => {
  if (e.key in keys) keys[e.key] = false;
});

function getHumanAction() {
  if (keys.ArrowLeft) return 0;
  if (keys.ArrowRight) return 2;
  return 1; 
}

async function reset() {
  const res = await fetch("/mountaincar/reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})  // send empty JSON object
  });
  const data = await res.json();
  draw(data.state);
}
  
async function step(action) {
  const res = await fetch(`${API_BASE}/step`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({action: action})
  });

  const data = await res.json();
  draw(data.state);

  // update lap times
  updateLaps(data.laps);

  // if episode ended, reset automatically
  if (data.done) {
    episode++;
    resetStage();
  }
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const minX = -1.2;
const maxX = 0.6;

function worldToCanvasX(x) {
  return ((x - minX) / (maxX - minX)) * canvas.width;
}

function mountainY(x) {
  return Math.sin(3 * x) * 0.45 + 0.55;
}

function draw(state, goalX=null) {
  const [pos, vel] = state;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // --- draw terrain ---
  ctx.beginPath();
  for (let px = 0; px < canvas.width; px++) {
    const x = minX + (px / canvas.width) * (maxX - minX);
    const y = mountainY(x) * canvas.height;

    if (px === 0) ctx.moveTo(px, y);
    else ctx.lineTo(px, y);
  }
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.stroke();

  // --- draw car ---
  const carX = worldToCanvasX(pos);
  const carY = mountainY(pos) * canvas.height;

  ctx.beginPath();
  ctx.arc(carX, carY - 10, 10, 0, 2 * Math.PI);
  ctx.fillStyle = "red";
  ctx.fill();

  // --- draw goal (training) ---
  if (goalX !== null) {
    const gx = worldToCanvasX(goalX);
    ctx.beginPath();
    ctx.moveTo(gx, 0);
    ctx.lineTo(gx, canvas.height);
    ctx.strokeStyle = "green";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

let running = false;

async function gameLoop() {
  if (!running) return;

  const action = getHumanAction();
  const res = await fetch("/mountaincar/step", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ action: action })
  });

  const data = await res.json();
  frameImg.src = "data:image/png;base64," + data.frame;

  updateLaps(data.laps);
  updateTimerDisplay(); // update every frame

  if (data.done) {
    await resetStage(); // reset timer + backend
  }

  setTimeout(gameLoop, 16);
}


startNewSession().then(async () => {
  await resetStage();
  running = true;
  gameLoop();
});

resetBtn.addEventListener("click", resetStage);

const statusEl = document.getElementById("status");

// MUST MATCH BACKEND
const HUMAN_ONLY_ITERS = 3;
const DECAY = 0.9;

function humanProb() {
  if (episode < HUMAN_ONLY_ITERS) return 1.0;
  return Math.max(0.1, Math.pow(DECAY, episode - HUMAN_ONLY_ITERS));
}

function updateStatus() {
  statusEl.textContent =
    `Steps: ${stepCount} | Human control probability: ${humanProb().toFixed(2)}`;
}

</script>



</body>
</html>
