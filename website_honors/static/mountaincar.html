<!DOCTYPE html>

<html>
<head>
  <title>MountainCar</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    canvas {
      border: 2px solid black;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>MountainCar</h2>

<canvas id="canvas" width="425" height="250"></canvas>

<p id="timer" style="font-size:14px; margin-top:6px;">Time: 0.0 s</p>
<p id="status" style="font-size:14px; margin-top:6px;"></p>
<div id="laps" style="margin-top:10px; font-size:14px;"></div>

<div class="instructions">
  <p><strong>Goal</strong><br>Reach the flag on the right hill.</p>
  <p><strong>Controls</strong><br>Left / Right Arrow keys.</p>
  <p><strong>Hint</strong><br>Move the car to gain enough momentum to reach the flag.</p>
</div>

<button id="resetBtn">Reset</button> <button onclick="leaveGame()">⬅ Back to Menu</button>

<script>

if (localStorage.getItem("mountaincarUnlocked") !== "true") {
    alert("You must complete MountainCar Training first.");
    window.location.href = "/static/mountaincar_training.html";
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const resetBtn = document.getElementById("resetBtn");
const API_BASE = "/mountaincar";

const keys = { ArrowLeft:false, ArrowRight:false };

let stageStartTime=null;
let running=false;
let episode=0;

const MIN_X=-1.2;
const MAX_X=0.6;

function worldToPixel(x){
  return ((x-MIN_X)/(MAX_X-MIN_X))*canvas.width;
}

function drawMountain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  for(let i=0;i<canvas.width;i++){
    const x = MIN_X + (i/canvas.width)*(MAX_X-MIN_X);
    const y = Math.sin(3*x)*0.45+0.55;
    const py = canvas.height*(1-y);
    if(i===0) ctx.moveTo(i,py);
    else ctx.lineTo(i,py);
  }
  ctx.strokeStyle="black";
  ctx.lineWidth=2;
  ctx.stroke();
}

function drawCar(position){

  const xPixel = worldToPixel(position);
  const yWorld = Math.sin(3*position)*0.45+0.55;
  const yPixel = canvas.height*(1-yWorld);

  ctx.fillStyle="red";
  ctx.fillRect(xPixel-10,yPixel-5,20,10);

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(xPixel-6,yPixel+5,3,0,Math.PI*2);
  ctx.arc(xPixel+6,yPixel+5,3,0,Math.PI*2);
  ctx.fill();
}

function drawFlag(){
  const goalPixel = worldToPixel(0.5);

  ctx.beginPath();
  ctx.moveTo(goalPixel,0);
  ctx.lineTo(goalPixel,canvas.height);
  ctx.strokeStyle="green";
  ctx.setLineDash([8,6]);
  ctx.stroke();
  ctx.setLineDash([]);
}

document.addEventListener("keydown",e=>{
  if(e.key in keys) keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
  if(e.key in keys) keys[e.key]=false;
});

function getHumanAction(){
  if(keys.ArrowLeft) return 0;
  if(keys.ArrowRight) return 2;
  return 1;
}

function getCurrentTime(){
  if(!stageStartTime) return 0;
  return (performance.now()-stageStartTime)/1000;
}

function updateTimerDisplay(){
  const timerEl=document.getElementById("timer");
  timerEl.textContent="Time: "+getCurrentTime().toFixed(1)+" s";
}

async function reset(){
  const res=await fetch("/mountaincar/reset",{method:"POST"});
  const data=await res.json();

  stageStartTime=performance.now();

  drawMountain();
  drawFlag();
  drawCar(data.position);
}

async function resetStage(){
  await reset();
}

async function step(action){

  const res=await fetch(`${API_BASE}/step`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:action})
  });

  const data=await res.json();

  drawMountain();
  drawFlag();
  drawCar(data.position);

  updateTimerDisplay();

  if(data.done){
    await resetStage();
  }
}

async function gameLoop(){

  if(!running) return;

  const action=getHumanAction();

  await step(action);

  setTimeout(gameLoop,16);
}

async function startNewSession(){
  await fetch("/mountaincar/newsession",{method:"POST"});
}

async function leaveGame(){
  await fetch("/mountaincar/newsession",{method:"POST"});
  window.location.href="/static/index.html";
}

startNewSession().then(async()=>{
  await resetStage();
  running=true;
  gameLoop();
});

resetBtn.addEventListener("click",resetStage);

</script>

</body>
</html>
