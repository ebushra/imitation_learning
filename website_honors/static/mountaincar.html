<!DOCTYPE html>
<html>
<head>
  <title>MountainCar</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 20px;
    }
    img {
      border: 2px solid black;
    }
    button {
      padding: 8px 16px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .instructions {
      font-size: 12px;
      max-width: 420px;
      margin: 10px auto;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>MountainCar</h2>
<canvas id="gameCanvas" width="300" height="200"></canvas>
<br>
<p id="timer" style="font-size:14px; margin-top:6px;">Time: 0 s</p>
<p id="status" style="font-size:14px; margin-top:6px;"></p>
<div id="laps" style="margin-top:10px; font-size:14px;"></div>



<div class="instructions">
  <p> <strong>Goal</strong><br> Reach the flag on the right hill.<br> </p>
  <p> <strong>Controls</strong><br> 
  Left / Right Arrow keys. </p> 
  <p> <strong>Hint</strong><br> Move the car to gain enough momentum to reach the flag. </p>
</div>
<p>

<button id="resetBtn">Reset</button>
<button onclick="leaveGame()">⬅ Back to Menu</button>


<script>
if (localStorage.getItem("mountaincarUnlocked") !== "true") {
    alert("You must complete MountainCar Training first.");
    window.location.href = "/static/mountaincar_training.html";
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const resetBtn = document.getElementById("resetBtn");
const lapsDiv = document.getElementById("laps");
const API_BASE = "/mountaincar";
const goalX = 0.5;

let keys = { ArrowLeft: false, ArrowRight: false };
let running = false;
let stageStartTime = null;
let laps = [];
let episode = 0;

// --- Controls ---
document.addEventListener("keydown", e => { if (e.key in keys) keys[e.key] = true; });
document.addEventListener("keyup", e => { if (e.key in keys) keys[e.key] = false; });

// --- Physics helpers ---
function mountainY(x) { return Math.sin(3*x)*0.45 + 0.55; }
function slope(x) { return 3*Math.cos(3*x)*0.45; }
function worldToCanvasX(x) { return ((x + 1.2) / 1.8) * canvas.width; }
function worldToCanvasY(y) { return canvas.height - (y * canvas.height); }

// --- Timer ---
function getCurrentTime() { return stageStartTime ? (performance.now() - stageStartTime)/1000 : 0; }
function updateTimerDisplay() { document.getElementById("timer").textContent = `Time: ${getCurrentTime()} s`; }

// --- Laps ---
function updateLapsDisplay() {
    lapsDiv.innerHTML = laps.length ? "<strong>Lap Times</strong><br>" + laps.map((t,i)=>`Round ${i+1}: ${t}s`).join("<br>") : "";
}

// --- Human action ---
function getHumanAction() {
    if (keys.ArrowLeft) return 0;
    if (keys.ArrowRight) return 2;
    return 1;
}

// --- Draw ---
// --- Draw ---
function draw(state) {
    const [pos, vel] = state;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Terrain
    ctx.beginPath();
    for (let px=0; px<canvas.width; px++) {
        const x = -1.2 + (px/canvas.width)*1.8;
        // scale terrain so top isn't cut off
        const y = mountainY(x) * 0.9 + 0.05; 
        const py = worldToCanvasY(y);
        if (px===0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Car as a dot
    const carX = worldToCanvasX(pos);
    const carY = worldToCanvasY(mountainY(pos) * 0.9 + 0.05);
    ctx.beginPath();
    ctx.arc(carX, carY, 5, 0, 2*Math.PI);
    ctx.fillStyle = "red";
    ctx.fill();

    // Flag
    const fx = worldToCanvasX(goalX);
    const fy = worldToCanvasY(mountainY(goalX) * 0.9 + 0.05);
    ctx.strokeStyle = "green";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx, fy-30); // shorter pole so it fits
    ctx.stroke();
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.moveTo(fx, fy-30);
    ctx.lineTo(fx+10, fy-20);
    ctx.lineTo(fx, fy-10);
    ctx.closePath();
    ctx.fill();
}

// --- Reset stage ---
async function resetStage() {
    const res = await fetch(`${API_BASE}/reset`, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({})
    });
    const data = await res.json();
    stageStartTime = performance.now();
    draw(data.state);
}

// --- Step / loop ---
let lastStepTime = 0;
const STEP_INTERVAL = 50; // ms between server steps (~20 Hz)

async function gameLoop(timestamp) {
    if (!running) return;

    // update timer immediately for smooth display
    updateTimerDisplay();

    // step only every STEP_INTERVAL
    if (!lastStepTime || (timestamp - lastStepTime) > STEP_INTERVAL) {
        lastStepTime = timestamp;
        const action = getHumanAction();
        const res = await fetch(`${API_BASE}/step`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({action})
        });
        const data = await res.json();

        draw(data.state);

        if (data.done) {
            laps.push(getCurrentTime().toFixed(1));
            updateLapsDisplay();
            episode++;
            await resetStage();
        }
    } else {
        // draw last known state to keep motion smooth
        drawLastState();
    }

    requestAnimationFrame(gameLoop);
}
// --- Start session ---
async function startNewSession() {
    await fetch(`${API_BASE}/newsession`, { method: "POST" });
    await resetStage();
    running = true;
    gameLoop();
}

// --- Buttons ---
resetBtn.addEventListener("click", resetStage);
async function leaveGame() {
    await fetch(`${API_BASE}/newsession`, { method: "POST" });
    window.location.href = "/static/index.html";
}

// --- Start ---
startNewSession();
</script>



</body>
</html>
