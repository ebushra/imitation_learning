<!DOCTYPE html>
<html>
<head>
  <title>MountainCar Training</title>
  <style>
    body { text-align: center; font-family: sans-serif; margin-top: 20px; }
    .game-container { display: inline-block; border: 2px solid black; padding: 8px; position: relative; }
    canvas { display: block; }
    button { padding: 8px 16px; margin: 8px; font-size: 16px; cursor: pointer; }
    #timer { font-size: 16px; margin-top: 8px; }
    #stageInfo { font-size: 16px; margin-top: 8px; font-weight: bold; }
  </style>
</head>
<body>

<div id="instructionsModal">
  <div id="instructionsModalContent">
    <h3>MountainCar Training Instructions</h3>
    <p><strong>Goal:</strong> Reach the green line at the top of the hill for each stage.</p>
    <p><strong>Controls:</strong> Use the <em>Left</em> and <em>Right Arrow</em> keys to accelerate the car.</p>
    <p><strong>Hint:</strong> Build momentum by rocking back and forth!</p>
    <button id="startTrainingBtn">Start Training</button>
  </div>
</div>

<style>
  #instructionsModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
    z-index: 10;
  }
  #instructionsModalContent {
    background: white; padding: 20px; border-radius: 6px; max-width: 400px; text-align: left;
  }
  #instructionsModal button { display: block; margin: 10px auto 0 auto; }
</style>

<h2>MountainCar Training</h2>

<div class="game-container">
  <canvas id="overlay" width="300" height="225"></canvas>
</div>

<h3 id="timer">Time: 0 s</h3>
<h3 id="stageInfo"></h3>

<button id="resetBtn">Restart Stage</button>
<button onclick="location.href='/index.html'">⬅ Back to Menu</button>

<script>

const overlay = document.getElementById("overlay");
const resetBtn = document.getElementById("resetBtn");
const API_BASE = "/mountaincar";
let keysPressed = { ArrowLeft:false, ArrowRight:false };
let stageIndex = 0;
let stageStartTime = null;
let trainingPassed = false;

// --- Training stages ---
const TRAINING_STAGES = [
  { goalX: 0.3, duration: 20 },
  { goalX: 0.45, duration: 25 }
];

// --- Controls ---
document.addEventListener("keydown", e => { if(e.key in keysPressed) keysPressed[e.key]=true; });
document.addEventListener("keyup", e => { if(e.key in keysPressed) keysPressed[e.key]=false; });

// --- Physics helpers ---
function mountainY(x) { return Math.sin(3*x)*0.45 + 0.55; }
function worldToCanvasX(x) { return ((x + 1.2)/1.8) * overlay.width; }
function worldToCanvasY(y) { return overlay.height - (y*overlay.height*0.9 + overlay.height*0.05); }

// --- Timer ---
function getCurrentTime() { return stageStartTime ? Math.floor((performance.now()-stageStartTime)/1000) : 0; }
function updateTimerDisplay() { document.getElementById("timer").textContent = `Time: ${getCurrentTime()} s`; }

// --- Stage text ---
function updateStageText() {
    const s = TRAINING_STAGES[stageIndex];
    document.getElementById("stageInfo").textContent = `Stage ${stageIndex+1}: Reach x ≥ ${s.goalX} in ${s.duration}s`;
}

// --- Human action ---
function getAction() {
    if(keysPressed.ArrowLeft) return 0;
    if(keysPressed.ArrowRight) return 2;
    return 1;
}

// --- Draw overlay ---
function drawOverlay(state, goalX) {
    const ctx = overlay.getContext("2d");
    ctx.clearRect(0,0,overlay.width, overlay.height);

    // Terrain
    ctx.beginPath();
    for(let px=0; px<overlay.width; px++) {
        const x = -1.2 + (px/overlay.width)*1.8;
        const py = worldToCanvasY(mountainY(x));
        if(px===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Car as dot
    
    const pos = state[0];
    
    const carX = worldToCanvasX(pos);
    const carY = worldToCanvasY(mountainY(pos));
    ctx.beginPath();
    ctx.arc(carX, carY, 5, 0, 2*Math.PI);
    ctx.fillStyle = "red";
    ctx.fill();

    // Goal flag
    const fx = worldToCanvasX(goalX);
    const fy = worldToCanvasY(mountainY(goalX));
    ctx.strokeStyle = "green";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx, fy-30);
    ctx.stroke();
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.moveTo(fx, fy-30);
    ctx.lineTo(fx+10, fy-20);
    ctx.lineTo(fx, fy-10);
    ctx.closePath();
    ctx.fill();
}

// --- Reset stage ---
async function resetStage() {
    const res = await fetch(`${API_BASE}/reset`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({training:true})
    });
    const data = await res.json();
    stageStartTime = performance.now();
    drawOverlay(data.state, TRAINING_STAGES[stageIndex].goalX);
}

// --- Training loop ---
async function trainingStep() {
    const action = getAction();
    const res = await fetch(`${API_BASE}/step`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action, training:true})
    });
    const data = await res.json();

    drawOverlay(data.state, TRAINING_STAGES[stageIndex].goalX);
    updateTimerDisplay();
    updateStageText();

    const stage = TRAINING_STAGES[stageIndex];

    if (data.state[0] >= stage.goalX) {
        stageIndex++;
        if(stageIndex >= TRAINING_STAGES.length) {
            trainingPassed = true;
            localStorage.setItem("mountaincarUnlocked","true");
            alert("Training complete! Full MountainCar unlocked.");
            window.location.href = "/mountaincar.html";
            return;
        }
        alert(`Stage ${stageIndex} complete! Next goal x ≥ ${TRAINING_STAGES[stageIndex].goalX}`);
        await resetStage();
        trainingStep(); // restart loop
        return;
    }

    if(getCurrentTime() > stage.duration) {
        alert("Time expired! Try building more momentum.");
        await resetStage();
        trainingStep();
        return;
    }

    if(!trainingPassed) requestAnimationFrame(trainingStep);
}

// --- Start training button ---
document.getElementById("startTrainingBtn").addEventListener("click", () => {
    document.getElementById("instructionsModal").style.display = 'none';
    resetStage().then(trainingStep);
});

// --- Buttons ---
resetBtn.addEventListener("click", resetStage);
</script>

</body>
</html>
