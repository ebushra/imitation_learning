<!DOCTYPE html>

<html>
<head>
<title>MountainCar Training</title>
<style>
body{ text-align:center;font-family:sans-serif;margin-top:20px; }
canvas{ border:2px solid black; }
button{ padding:8px 16px;margin:8px;font-size:16px;cursor:pointer; }
#timer{font-size:16px;margin-top:8px;}
#stageInfo{font-size:16px;margin-top:8px;font-weight:bold;}
</style>
</head>

<body>

<div id="instructionsModal">
  <div id="instructionsModalContent">
    <h3>MountainCar Training Instructions</h3>
    <p><strong>Goal:</strong> Reach the green line.</p>
    <p><strong>Controls:</strong> Left / Right arrows.</p>
    <p><strong>Hint:</strong> Rock back and forth to gain momentum.</p>
    <button id="startTrainingBtn">Start Training</button>
  </div>
</div>

<style>
#instructionsModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 display:flex;justify-content:center;align-items:center;
}
#instructionsModalContent{
 background:white;padding:20px;border-radius:6px;
 max-width:400px;text-align:left;
}
</style>

<h2>MountainCar Training</h2>

<canvas id="canvas" width="400" height="250"></canvas>

<h3 id="timer">Time: 0.0 s</h3>
<h3 id="stageInfo"></h3>

<button id="resetBtn">Restart Stage</button> <button onclick="location.href='/index.html'">⬅ Back to Menu</button>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const resetBtn=document.getElementById("resetBtn");
const API_BASE="/mountaincar";

const MIN_X=-1.2;
const MAX_X=0.6;

const keysPressed={ArrowLeft:false,ArrowRight:false};

let stageIndex=0;
let stageStartTime=null;

const TRAINING_STAGES=[
 {goalX:0.3,duration:20},
 {goalX:0.45,duration:25}
];

function worldToPixel(x){
 return ((x-MIN_X)/(MAX_X-MIN_X))*canvas.width;
}

function drawMountain(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.beginPath();
 for(let i=0;i<canvas.width;i++){
  const x=MIN_X+(i/canvas.width)*(MAX_X-MIN_X);
  const y=Math.sin(3*x)*0.45+0.55;
  const py=canvas.height*(1-y);

  if(i===0) ctx.moveTo(i,py);
  else ctx.lineTo(i,py);
 }

 ctx.strokeStyle="black";
 ctx.lineWidth=2;
 ctx.stroke();
}

function drawCar(position){

 const xPixel=worldToPixel(position);
 const yWorld=Math.sin(3*position)*0.45+0.55;
 const yPixel=canvas.height*(1-yWorld);

 ctx.fillStyle="red";
 ctx.fillRect(xPixel-10,yPixel-5,20,10);

 ctx.fillStyle="black";
 ctx.beginPath();
 ctx.arc(xPixel-6,yPixel+5,3,0,Math.PI*2);
 ctx.arc(xPixel+6,yPixel+5,3,0,Math.PI*2);
 ctx.fill();
}

function drawGoal(goalX){

 const goalPixel=worldToPixel(goalX);

 ctx.beginPath();
 ctx.moveTo(goalPixel,0);
 ctx.lineTo(goalPixel,canvas.height);
 ctx.setLineDash([10,8]);
 ctx.strokeStyle="green";
 ctx.lineWidth=4;
 ctx.stroke();
 ctx.setLineDash([]);
}

document.addEventListener("keydown",e=>{
 if(e.key in keysPressed) keysPressed[e.key]=true;
});

document.addEventListener("keyup",e=>{
 if(e.key in keysPressed) keysPressed[e.key]=false;
});

function getAction(){
 if(keysPressed.ArrowLeft) return 0;
 if(keysPressed.ArrowRight) return 2;
 return 1;
}

function getCurrentTime(){
 if(!stageStartTime) return 0;
 return (performance.now()-stageStartTime)/1000;
}

function updateTimerDisplay(){
 document.getElementById("timer").textContent=
 "Time: "+getCurrentTime().toFixed(1)+" s";
}

function updateStageText(){
 const s=TRAINING_STAGES[stageIndex];
 document.getElementById("stageInfo").textContent=
 `Stage ${stageIndex+1}: Reach x ≥ ${s.goalX}`;
}

async function reset(){

 const res=await fetch(`${API_BASE}/reset`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({training:true})
 });

 const data=await res.json();

 stageStartTime=performance.now();

 drawMountain();
 drawGoal(TRAINING_STAGES[stageIndex].goalX);
 drawCar(data.position);
}

async function resetStage(){
 await reset();
}

async function step(){

 const action=getAction();

 const res=await fetch(`${API_BASE}/step`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({action:action,training:true})
 });

 const data=await res.json();

 drawMountain();
 drawGoal(TRAINING_STAGES[stageIndex].goalX);
 drawCar(data.position);

 updateTimerDisplay();
 updateStageText();

 const stage=TRAINING_STAGES[stageIndex];

 if(data.position>=stage.goalX){

  stageIndex++;

  if(stageIndex>=TRAINING_STAGES.length){

   localStorage.setItem("mountaincarUnlocked","true");

   alert("Training complete! Full MountainCar unlocked.");

   window.location.href="/mountaincar.html";
   return;
  }

  alert("Stage complete!");

  await resetStage();
 }

 if(getCurrentTime()>stage.duration){

  alert("Time expired! Try building momentum.");

  await resetStage();
 }

 setTimeout(step,16);
}

document.getElementById("startTrainingBtn").addEventListener("click",()=>{
 document.getElementById("instructionsModal").style.display="none";
 resetStage().then(step);
});

resetBtn.addEventListener("click",resetStage);

</script>

</body>
</html>
